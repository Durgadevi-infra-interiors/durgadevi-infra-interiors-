<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | Durgadevi Infra & Interiors</title>

<link rel="stylesheet" href="style.css">
</head>

<body class="auth-page">

<div class="auth-box">

<img src="images/image.jpeg" class="auth-logo" alt="Logo">

<h1>Welcome Back</h1>

<p>
Sign in to access your account and continue with
Durgadevi Infra & Interiors services.
</p>

<form id="loginForm">

<input
type="email"
id="loginEmail"
placeholder="Email Address"
required>

<input
type="password"
id="loginPassword"
placeholder="Password"
required>

<button type="submit">
Sign In
</button>

</form>

<div class="security-note">
🔒 Secure login protected by account authentication.
</div>

<div class="auth-footer">
Don't have an account?
<a href="register.html">Create Account</a>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
